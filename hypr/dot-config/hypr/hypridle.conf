general {
    lock_cmd = pidof hyprlock || hyprlock                                  
    before_sleep_cmd = loginctl lock-session                                
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'  
}

listener {
    timeout = 150                             
    on-timeout = brightnessctl -s set 10       
    on-resume = brightnessctl -r && bluetoothctl 'connect 10:94:97:36:C7:15'
}

listener {
    timeout = 300                                
    on-timeout = loginctl lock-session            
}

listener {
    timeout = 600                                                                                  
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'                           
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' && brightnessctl -r && bluetoothctl 'connect 10:94:97:36:C7:15'
}

listener {
    timeout = 5400                                
    on-timeout = systemctl suspend               
    on-resume = bluetoothctl 'connect 10:94:97:36:C7:15'
}
