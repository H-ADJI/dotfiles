# colors
$bg = rgba(f7f7f7ff)
$fg = rgba(111111ff)
$muted = rgba(555555ff)
$border = rgba(11111155)
$fail = rgba(8a0000ff)
$box = rgba(ffffffaa)
$shadow = rgba(00000018)
# boxes positions
$time_box_y = 420
$login_box_y = 0
$music_box_y = -420
# content positions
$time_y = 400
$date_y = 480
$user_y = 45
$input_y = -35
$song_y = -400
$song_ctrl_y = -450

general {
    text_trim = true
    fail_timeout = 1800
}

background {
    monitor =
    path = ~/.config/assets/coa_none.png
    blur_passes = 1
    blur_size = 6
    color = $bg
}

# --------------------------------------------------
# Time Box
# --------------------------------------------------

shape {
    monitor =
    size = 620, 170
    color = $box
    rounding = 34
    border_size = 1
    border_color = $border
    shadow_passes = 2
    shadow_size = 8
    shadow_color = $shadow
    position = 0, $time_box_y
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $fg
    font_size = 86
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, $time_y
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = $muted
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, $date_y
    halign = center
    valign = center
}

# --------------------------------------------------
# Login Box
# --------------------------------------------------

shape {
    monitor =
    size = 450, 160
    color = $box
    rounding = 34
    border_size = 1
    border_color = $border
    shadow_passes = 2
    shadow_size = 8
    shadow_color = $shadow
    position = 0, $login_box_y
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = $muted
    font_size = 20
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, $user_y
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 54
    outline_thickness = 1
    inner_color = rgba(ffffffcc)
    outer_color = $border
    font_color = $fg
    check_color = rgba(111111ff)
    fail_color = $fail
    capslock_color = rgba(000000ff)
    dots_size = 0.22
    dots_spacing = 0.22
    dots_center = true
    fade_on_empty = false
    placeholder_text = <span foreground="##555555">Password</span>
    fail_text = <span foreground="##8a0000">$FAIL ($ATTEMPTS)</span>
    rounding = 999
    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(00000010)
    position = 0, $input_y
    halign = center
    valign = center
}

# --------------------------------------------------
# Music Box
# --------------------------------------------------

shape {
    monitor =
    size = 680, 120
    color = $box
    rounding = 28
    border_size = 1
    border_color = $border
    shadow_passes = 2
    shadow_size = 8
    shadow_color = $shadow
    position = 0, $music_box_y
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] ~/.config/scripts/current_song
    color = $fg
    font_size = 15
    font_family = JetBrainsMono Nerd Font
    text_align = center
    position = 0, $song_y 
    halign = center
    valign = center
}
# --------------------------------------------------
# Music Controls
# --------------------------------------------------

label {
    monitor =
    text = ⏮
    color = $fg
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    position = -60, $song_ctrl_y
    halign = center
    valign = center
    onclick = playerctl previous
}

label {
    monitor =
    text = cmd[update:500] playerctl status 2>/dev/null | grep -q Playing && echo "⏸" || echo "▶"
    color = $fg
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    position = 0, $song_ctrl_y
    halign = center
    valign = center
    onclick = playerctl play-pause
}

label {
    monitor =
    text = ⏭
    color = $fg
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    position = 60, $song_ctrl_y
    halign = center
    valign = center
    onclick = playerctl next
}
